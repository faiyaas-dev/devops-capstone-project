name: Notify Profile Update

on:
  push:
    branches:
      - main

jobs:
  ping-profile:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch Event to Profile Repo
        run: |
          curl -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
               -H "Accept: application/vnd.github.v3+json" \
               X POST \
               -d "{\"event_type\": \"project_update\", \"client_payload\": {\"commit_msg\": \"${{ github.event.head_commit.message }}\", \"sha\": \"${{ github.sha }}\"}}" \
               https://api.github.com/repos/faiyaas-dev/faiyaas-dev/dispatches
